<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUDY GAME - 게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  @import url('http://fonts.googleapis.com/earlyaccess/nanumgothic.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #f8f8f8;
    color: #222222;
  }

  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }
  img { display: block; max-width: 100%; }
  button { font-family: inherit; border: none; cursor: pointer; }

  .cat-all, .cat-list li, .play, .pager a, button, .search, .gnb a {
    user-select: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .inner {
    width: 1100px;
    max-width: 92%;
    margin: 0 auto;
  }

  /* ===== Header ===== */
  header {
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 10px rgba(255, 122, 168, .08);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 90px;
  }

  .logo img { height: 64px; }

  .gnb { display: flex; flex: 1; justify-content: center; gap: 46px; }

  .gnb a {
    position: relative;
    display: flex;
    align-items: center;
    height: 90px;
    font-size: 16px;
    font-weight: 700;
    color: #222222;
    transition: color .2s;
  }

  .gnb a.on, .gnb a:hover { color: #FD79AF; }

  .gnb a::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -3px;
    transform: translateX(-50%);
    width: 0;
    height: 8px;
    border-radius: 4px;
    background: #FD79AF;
    transition: width .25s;
  }

  .gnb a:hover::after, .gnb a.on::after { width: calc(100% + 14px); }

  .header-util {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-util .search img { width: 22px; height: 22px; }

  .btn-login {
    padding: 8px 20px;
    border: 1.5px solid #FF9AC4;
    border-radius: 999px;
    background: #fff;
    color: #FD79AF;
    font-size: 14px;
    font-weight: 700;
  }

  .btn-join {
    padding: 9px 20px;
    border-radius: 999px;
    background: #FD79AF;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
  }

  /* ===== Hero ===== */
  .hero {
    position: relative;
    height: 360px;
    background: url('images/sub_main.png') center / cover no-repeat;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,247,238,.55) 0%, rgba(255,247,238,.15) 45%, rgba(255,247,238,0) 65%);
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .hero h2 {
    font-family: 'Jua', sans-serif;
    font-size: 50px;
    line-height: 1.25;
    color: #fff;
    font-weight: 400;
    text-shadow: 0 3px 8px rgba(120, 70, 40, .35);
  }

  .hero h2 .point { color: #FD79AF; }

  .hero p {
    margin-top: 18px;
    font-size: 18px;
    line-height: 1.6;
    color: #222222;
    font-weight: 500;
  }

  /* ===== Game list section ===== */
  .game-sec { padding: 56px 0 80px; }

  /* 게임 섹션은 넓게 (사이드바가 좌측 끝으로) */
  .game-sec .inner { width: 1600px; max-width: 96%; }

  .game-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 34px;
    flex-wrap: wrap;
  }

  .game-top h2 {
    font-family: 'Jua', sans-serif;
    font-size: 30px;
    color: #222222;
    font-weight: 400;
  }

  .search-box {
    position: relative;
    width: 340px;
    max-width: 100%;
  }

  .search-box input {
    width: 100%;
    border: 2px solid #FCE7F1;
    background: #fff;
    border-radius: 999px;
    padding: 13px 20px 13px 50px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    color: #222222;
  }

  .search-box input::placeholder { color: #222222; }
  .search-box input:focus { border-color: #FF9AC4; }

  .search-box .ico {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    object-fit: contain;
  }

  .layout {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 22px;
    align-items: start;
  }

  /* ===== Sidebar ===== */
  .sidebar { position: sticky; top: 110px; }

  .cat-all {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FD79AF;
    color: #fff;
    border-radius: 999px;
    padding: 17px 22px;
    font-weight: 800;
    font-size: 18px;
    box-shadow: 0 6px 14px rgba(255, 95, 162, .28);
    margin-bottom: 18px;
  }

  .cat-all img { width: 24px; height: 24px; object-fit: contain; filter: brightness(0) invert(1); }

  .cat-list {
    background: #fff;
    border: 1px solid #FCE7F1;
    border-radius: 20px;
    padding: 4px 18px;
    box-shadow: 0 6px 18px rgba(255, 122, 168, .10);
  }

  .cat-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 17px 4px;
    font-weight: 700;
    font-size: 16px;
    color: #222222;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 1px solid #FCE7F1;
    transition: color .15s;
  }

  .cat-list li:last-child { border-bottom: none; }
  .cat-list li:hover { color: #FD79AF; }
  .cat-list li img { width: 28px; height: 28px; object-fit: contain; }

  /* ===== Game grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
  }

  .card {
    background: #fff;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(255, 122, 168, .12);
    transition: transform .18s, box-shadow .18s;
  }

  .card:hover { transform: translateY(-5px); box-shadow: 0 14px 26px rgba(255, 95, 162, .22); }

  .card .thumb {
    overflow: hidden;
  }

  .card .thumb img {
    display: block;
    width: 100%;
    height: auto;
  }

  .card-body { padding: 14px 16px 16px; }

  .card-body h3 {
    font-size: 16px;
    font-weight: 700;
    color: #222222;
    margin-bottom: 9px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .meta {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #222222;
    white-space: nowrap;
  }

  .meta .heart { width: 14px; height: 14px; object-fit: contain; }
  .meta .count { color: #222222; }

  .play {
    margin-left: auto;
    flex-shrink: 0;
    background: #FD79AF;
    color: #fff;
    border-radius: 14px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transition: background .2s;
  }

  .play:hover { background: #FD79AF; }

  /* ===== Pagination ===== */
  .pager {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 50px;
  }

  .pager a {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: #FD79AF;
    background: #fff;
    box-shadow: 0 4px 10px rgba(255, 122, 168, .12);
    transition: .15s;
  }

  .pager a.on, .pager a:hover { background: #FD79AF; color: #fff; }

  /* ===== Footer ===== */
  footer { background: #FF9AC4; padding: 40px 0; }

  .footer-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 30px;
  }

  .footer-left { display: flex; align-items: center; gap: 22px; }
  .footer-left .f-logo img { height: 58px; }

  .footer-left .f-txt {
    font-size: 13px;
    line-height: 1.7;
    color: #fff;
  }

  .footer-center {
    display: flex;
    gap: 10px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .footer-center a:hover { text-decoration: underline; }

  .footer-sns { display: flex; gap: 12px; }

  .footer-sns a {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, .25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }

  .footer-sns a:hover { background: rgba(255, 255, 255, .45); }

  .footer-sns img {
    width: 20px;
    height: 20px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }

  /* ===== Hamburger (mobile) ===== */
  .menu-btn { display: none; background: none; width: 40px; height: 40px; position: relative; }
  .menu-btn span,
  .menu-btn span::before,
  .menu-btn span::after {
    content: '';
    display: block;
    position: absolute;
    left: 8px;
    width: 24px;
    height: 3px;
    border-radius: 999px;
    background: #FD79AF;
  }
  .menu-btn span { top: 19px; }
  .menu-btn span::before { left: 0; top: -8px; }
  .menu-btn span::after { left: 0; top: 8px; }

  /* ===== Responsive ===== */
  @media (max-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .hero h2 { font-size: 40px; }
    .gnb { gap: 24px; }
    .gnb a { font-size: 15px; }
  }

  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; }
    .cat-all { margin-bottom: 12px; }
    .cat-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .cat-list li { flex: 1 1 auto; justify-content: center; }
  }

  @media (max-width: 768px) {
    .header-inner { height: 70px; }
    .logo img { height: 48px; }
    .menu-btn { display: block; }

    .gnb {
      display: none;
      position: absolute;
      top: 70px;
      left: 0;
      right: 0;
      flex-direction: column;
      gap: 0;
      background: #fff;
      padding: 8px 0 14px;
      box-shadow: 0 14px 20px rgba(255, 122, 168, .15);
    }
    .gnb.open { display: flex; }
    .gnb a { height: 50px; justify-content: center; }
    .gnb a::after { display: none; }

    .btn-login, .btn-join { padding: 7px 14px; font-size: 13px; }

    .hero { height: 280px; }
    .hero h2 { font-size: 30px; }
    .hero p { font-size: 14px; margin-top: 12px; }

    .game-sec { padding: 40px 0 60px; }
    .game-top h2 { font-size: 24px; }
    .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }

    footer { padding: 30px 0; }
    .footer-inner { flex-direction: column; text-align: center; gap: 18px; }
    .footer-left { flex-direction: column; gap: 12px; }
  }

  @media (max-width: 480px) {
    .btn-login { display: none; }
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .card-body { padding: 12px; }
    .meta { flex-wrap: wrap; }
  }

  /* ── NanumGothic 전체 적용 (메인 히어로 배너 제외) ── */
  * { font-family: 'Nanum Gothic', sans-serif !important; }
  .hero h2, .hero h2 * { font-family: 'Jua', sans-serif !important; }
  .hero p { font-family: 'Noto Sans KR', sans-serif !important; }

  /* ===== 게임 모달 ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(90, 40, 70, .55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    position: relative;
    background: #fff;
    border-radius: 24px;
    padding: 18px;
    width: 100%;
    max-width: 640px;
    box-shadow: 0 24px 70px rgba(120, 40, 80, .4);
    animation: modalPop .22s ease;
  }
  @keyframes modalPop {
    from { transform: scale(.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal img {
    display: block;
    width: 100%;
    border-radius: 16px;
  }
  .modal h3 {
    margin: 16px 0 4px;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    color: #222222;
  }
  .modal .m-desc {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: #FD79AF;
    margin-bottom: 6px;
  }
  .modal-close {
    position: absolute;
    top: -14px;
    right: -14px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #FD79AF;
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    border: 3px solid #fff;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(120, 40, 80, .3);
  }
</style>
</head>
<body>

<!-- ===== Header ===== -->
<header>
  <div class="inner header-inner">
    <h1 class="logo"><a href="index.html"><img src="images/logo.png" alt="JUDY GAME"></a></h1>
    <nav class="gnb">
      <a href="index.html">홈</a>
      <a href="game.html" class="on">게임</a>
      <a href="ranking.html">랭킹</a>
      <a href="judyworld.html">쥬디월드</a>
      <a href="notice.html">공지사항</a>
      <a href="community.html">커뮤니티</a>
    </nav>
    <div class="header-util">
      <a href="#" class="search"><img src="images/magnifier.png" alt="검색"></a>
      <button class="btn-login">로그인</button>
      <button class="btn-join">회원가입</button>
      <button class="menu-btn" aria-label="메뉴"><span></span></button>
    </div>
  </div>
</header>

<!-- ===== Hero ===== -->
<section class="hero">
  <div class="inner hero-inner">
    <h2>재미 가득!<br><span class="point">쥬디의 게임월드</span></h2>
    <p>다양하고 즐거운 게임을<br>지금 바로 플레이해보세요!</p>
  </div>
</section>

<!-- ===== Game list ===== -->
<section class="game-sec">
  <div class="inner">
    <div class="game-top">
      <h2>전체 게임</h2>
      <div class="search-box">
        <img class="ico" src="images/magnifier.png" alt="검색">
        <input type="text" placeholder="찾으시는 게임을 검색하세요.">
      </div>
    </div>

    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="cat-all"><img src="images/sub_home.png" alt=""> 전체 게임</div>
        <ul class="cat-list">
          <li><img src="images/hot_icon.png" alt=""> 인기 게임</li>
          <li><img src="images/item_02.png" alt=""> 파티</li>
          <li><img src="images/item_03.png" alt=""> 요리</li>
          <li><img src="images/item_04.png" alt=""> 꾸미기</li>
          <li><img src="images/item_05.png" alt=""> 메이크업</li>
          <li><img src="images/item_06.png" alt=""> 패션</li>
          <li><img src="images/item_07.png" alt=""> 시뮬레이션</li>
        </ul>
      </aside>

      <!-- Game grid -->
      <div>
        <div class="grid" id="grid"></div>
        <div class="pager">
          <a href="#" class="on">1</a>
          <a href="#">2</a>
          <a href="#">3</a>
          <a href="#">4</a>
          <a href="#">5</a>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ===== Footer ===== -->
<footer>
  <div class="inner footer-inner">
    <div class="footer-left">
      <a href="index.html" class="f-logo"><img src="images/logo.png" alt="JUDY GAME"></a>
      <div class="f-txt">
        쥬디게임은 언제나 즐겁고 안전한<br>
        게임 환경을 제공하기 위해 노력합니다.<br>
        &copy; JUDYGAME. All rights reserved.
      </div>
    </div>
    <div class="footer-center">
      <a href="#">이용약관</a>&nbsp;|&nbsp;
      <a href="#">개인정보처리방침</a>&nbsp;|&nbsp;
      <a href="#">문의하기</a>
    </div>
    <div class="footer-sns">
      <a href="#"><img src="images/instagram.png" alt="인스타그램"></a>
      <a href="#"><img src="images/youtube.png" alt="유튜브"></a>
      <a href="#"><img src="images/letter.png" alt="메일"></a>
    </div>
  </div>
</footer>

<script>
  const games = [
    ["쥬디의 찜질방", "시뮬레이션", "229,200"],
    ["쥬디의 드레스샵", "시뮬레이션", "214,190"],
    ["쥬디의 메이크업 테스트", "메이크업", "194,105"],
    ["쥬디의 외출준비", "꾸미기", "214,180"],
    ["쥬디의 달콤 디저트", "요리", "119,300"],
    ["쥬디의 나이팅게일", "시뮬레이션", "14,180"],
    ["쥬디의 새콤달콤 과일", "요리", "4,105"],
    ["쥬디의 쇼핑 대작전", "꾸미기", "210,170"],
    ["쥬디의 스위트 카페", "요리", "229,200"],
    ["쥬디의 애완동물 샵", "시뮬레이션", "214,190"],
    ["쥬디의 방청소 대작전", "시뮬레이션", "194,105"],
    ["쥬디의 네일아트", "메이크업", "214,180"],
    ["쥬디의 틀린 그림찾기", "파티", "229,200"],
    ["쥬디의 마트 장보기", "파티", "214,190"],
    ["쥬디의 웨딩 데이", "시뮬레이션", "194,105"],
    ["쥬디의 즐거운 파티", "파티", "214,180"],
    ["쥬디의 변신거울", "꾸미기", "229,200"],
    ["쥬디의 뷰티 메이크업", "메이크업", "214,190"],
    ["쥬디의 파티 파티", "파티", "194,105"],
    ["쥬디의 PC방 타이쿤", "시뮬레이션", "214,180"]
  ];

  const grid = document.getElementById('grid');
  games.forEach((g, i) => {
    const [title, cat, count] = g;
    const card = document.createElement('a');
    card.href = 'play.html?game=' + i;
    card.className = 'card';
    card.innerHTML = `
      <div class="thumb"><img src="images/sub_game${i + 1}.png" alt="${title}"></div>
      <div class="card-body">
        <h3>${title}</h3>
        <div class="meta">
          <span>${cat}</span>
          <img class="heart" src="images/sub_heart.png" alt="">
          <span class="count">${count}</span>
          <span class="play">게임하기</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  // 모바일 햄버거 메뉴
  const menuBtn = document.querySelector('.menu-btn');
  const gnb = document.querySelector('.gnb');
  menuBtn.addEventListener('click', () => gnb.classList.toggle('open'));
  gnb.querySelectorAll('a').forEach(a => a.addEventListener('click', () => gnb.classList.remove('open')));
</script>
</body>
</html>
